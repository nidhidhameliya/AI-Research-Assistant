version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: engineer_hub_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engineer_hub_backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./vectorstore:/app/vectorstore
      - ./sample-data:/app/sample-data
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_CHAT_MODEL=${GROQ_CHAT_MODEL:-llama-3.3-70b-versatile}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - UPLOAD_DIR=/app/uploads
      - APP_NAME=AI Research Assistant
      - APP_DB_PATH=/app/vectorstore/app.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=INFO
    depends_on:
      - chromadb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: engineer_hub_frontend
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_APP_NAME=AI Research Assistant
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
